<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookshelf</title>

    <!-- Bootstrap 5 CDN -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <!-- Bootstrap Icons for sort indicators -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">

<div class="container py-4">

    <h1 class="mb-1">Demo Bookshelf</h1>
    <p class="text-muted mb-4">Search, sort and browse your reading list.</p>

    <!-- Add Book Form -->
    <div class="card mb-4">
        <div class="card-header fw-semibold">Add a Book</div>
        <div class="card-body">
            <!-- Row 1: Required fields -->
            <div class="row g-2 mb-2">
                <div class="col-md-3">
                    <input id="input-title" type="text"
                        class="form-control" placeholder="Title *" />
                </div>
                <div class="col-md-3">
                    <input id="input-author" type="text"
                        class="form-control" placeholder="Author *" />
                </div>
                <div class="col-md-3">
                    <input id="input-genre" type="text"
                        class="form-control" placeholder="Genre *" />
                </div>
                <div class="col-md-3">
                    <select id="input-status" class="form-select">
                        <option value="Want to Read">Want to Read</option>
                        <option value="Reading">Reading</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
            </div>
            <!-- Row 2: Optional notes + submit -->
            <div class="row g-2">
                <div class="col-md-10">
                    <input id="input-notes" type="text"
                        class="form-control" placeholder="Notes (optional)" />
                </div>
                <div class="col-md-2">
                    <button id="btn-add" class="btn btn-primary w-100">
                        Add Book
                    </button>
                </div>
            </div>
            <div id="form-error" class="text-danger mt-2 d-none"></div>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="row mb-3">
        <div class="col-md-5">
            <input
                id="search-input"
                type="text"
                class="form-control"
                placeholder="Search by title, author or genre (min. 3 characters)..."
            />
        </div>
        <!-- Contains / Equals dropdown -->
        <div class="col-md-2">
            <select id="search-mode-select" class="form-select">
                <option value="contains" selected>Contains</option>
                <option value="equals">Equals</option>
            </select>
        </div>
        <div class="col-md-2">
            <select id="page-size-select" class="form-select">
                <option value="5" selected>5 per page</option>
                <option value="10">10 per page</option>
                <option value="20">20 per page</option>
            </select>
        </div>
        <div class="col-md-3 d-flex align-items-center">
            <span id="result-count" class="text-muted small"></span>
        </div>
    </div>

    <!-- Books Grid -->
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="sortable" data-col="Title">
                            Title <i class="bi bi-arrow-down-up sort-icon"></i>
                        </th>
                        <th class="sortable" data-col="Author">
                            Author <i class="bi bi-arrow-down-up sort-icon"></i>
                        </th>
                        <th class="sortable" data-col="Genre">
                            Genre <i class="bi bi-arrow-down-up sort-icon"></i>
                        </th>
                        <th class="sortable" data-col="Status">
                            Status <i class="bi bi-arrow-down-up sort-icon"></i>
                        </th>
                        <th>Notes</th>
                        <th class="sortable" data-col="CreatedDateTime">
                            Added <i class="bi bi-arrow-down-up sort-icon"></i>
                        </th>
                        <th class="sortable" data-col="ModifiedDateTime">
                            Modified <i class="bi bi-arrow-down-up sort-icon"></i>
                        </th>
                    </tr>
                </thead>
                <tbody id="books-tbody">
                    <tr>
                        <td colspan="7" class="text-center text-muted py-4">
                            Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-between align-items-center mt-3">
        <div id="pagination-info" class="text-muted small"></div>
        <nav>
            <ul id="pagination-controls" class="pagination mb-0"></ul>
        </nav>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
